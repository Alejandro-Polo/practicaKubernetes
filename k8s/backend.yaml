apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: alejandropolobarranco/symfony-backend:latest
        env:
        - name: DATABASE_URL
          value: mysql://symfony:symfony@database:3306/app_db
        - name: PHP_SESSION_SAVE_PATH
          value: /tmp
        ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
  - port: 8000